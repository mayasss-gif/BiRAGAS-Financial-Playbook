                  textTransform: "uppercase", fontFamily: "monospace", marginBottom: 3
                }}>
                  {String(i + 1).padStart(2, "0")} / {String(sections.length).padStart(2, "0")}
                </div>
                <div style={{
                  fontSize: 13, color: activeSection === i ? "#F5F0E8" : "#888",
                  fontWeight: activeSection === i ? 600 : 400, letterSpacing: "0.01em"
                }}>
                  {s.label}
                </div>
                <div style={{
                  fontSize: 11, color: activeSection === i ? "#999" : "#555",
                  marginTop: 2, fontStyle: "italic"
                }}>
                  {s.subtitle}
                </div>
              </button>
            ))}
          </div>

          <div className="main-pad" style={{ flex: 1, padding: "36px 44px", overflowY: "auto", maxWidth: 900 }}>
            <select className="mobile-section-pick" value={activeSection} onChange={(e) => setActiveSection(parseInt(e.target.value, 10))} style={{
              width: "100%", padding: "10px 14px", background: "#1A1A1A",
              color: "#F5F0E8", border: "1px solid #333", borderRadius: 4,
              fontSize: 13, fontFamily: "monospace", marginBottom: 24, cursor: "pointer"
            }}>
              {sections.map((s, i) => (
                <option key={s.id} value={i}>{String(i+1).padStart(2,"0")} · {s.label} · {s.subtitle}</option>
              ))}
            </select>
            <div style={{
              fontSize: 10, letterSpacing: "0.25em", color: section.color,
              textTransform: "uppercase", fontFamily: "monospace", marginBottom: 6
            }}>
              {section.label} · {section.subtitle}
            </div>
            <h2 style={{
              fontSize: 30, fontWeight: 700, color: "#F5F0E8",
              margin: "0 0 22px", letterSpacing: "-0.4px", lineHeight: 1.2
            }}>
              {section.content.headline}
            </h2>

            <div style={{
              fontSize: 15, lineHeight: 1.8, color: "#C8C4BC",
              marginBottom: 32, whiteSpace: "pre-line"
            }}>
              {section.content.body}
            </div>

            {section.content.tactics && section.content.tactics.length > 0 && (
              <div style={{
                background: "#0F0F0F", border: "1px solid #222",
                borderLeft: `3px solid ${section.color}`, borderRadius: 4,
                padding: "20px 24px", marginBottom: 24
              }}>
                <div style={{
                  fontSize: 10, letterSpacing: "0.25em", color: section.color,
                  textTransform: "uppercase", fontFamily: "monospace", marginBottom: 12
                }}>
                  Pitch Tactics
                </div>
                <ul style={{ margin: 0, paddingLeft: 18, color: "#C8C4BC", fontSize: 14, lineHeight: 1.7 }}>
                  {section.content.tactics.map((t, i) => <li key={i} style={{ marginBottom: 6 }}>{t}</li>)}
                </ul>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32, paddingTop: 22, borderTop: "1px solid #222" }}>
              <button
                onClick={() => setActiveSection(Math.max(0, activeSection - 1))}
                disabled={activeSection === 0}
                style={{
                  background: "transparent", border: "1px solid #333",
                  color: activeSection === 0 ? "#444" : "#888",
                  padding: "9px 20px", borderRadius: 4,
                  cursor: activeSection === 0 ? "default" : "pointer",
                  fontSize: 12, fontFamily: "monospace", letterSpacing: "0.1em"
                }}
              >
                ← Previous
              </button>
              <button
                onClick={() => setActiveSection(Math.min(sections.length - 1, activeSection + 1))}
                disabled={activeSection === sections.length - 1}
                style={{
                  background: activeSection === sections.length - 1 ? "transparent" : section.color,
                  border: `1px solid ${activeSection === sections.length - 1 ? "#333" : section.color}`,
                  color: activeSection === sections.length - 1 ? "#444" : "#fff",
                  padding: "9px 20px", borderRadius: 4,
                  cursor: activeSection === sections.length - 1 ? "default" : "pointer",
                  fontSize: 12, fontFamily: "monospace", letterSpacing: "0.1em"
                }}
              >
                Next →
              </button>
            </div>
          </div>
        </div>
      ) : (
        <div className="main-pad" style={{ flex: 1, padding: "36px 44px", maxWidth: 900, overflowY: "auto" }}>
          <div style={{ fontSize: 10, letterSpacing: "0.25em", color: "#C8102E", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 8 }}>
            Handling Financial Objections
          </div>
          <h2 style={{ fontSize: 28, fontWeight: 700, color: "#F5F0E8", margin: "0 0 28px", letterSpacing: "-0.3px" }}>
            Every Hard Financial Question. Answered.
          </h2>
          {objections.map((o, i) => (
            <div key={i} style={{
              background: activeObj === i ? "#141414" : "#0F0F0F",
              border: `1px solid ${activeObj === i ? "#C8102E" : "#222"}`,
              borderRadius: 6, marginBottom: 12, overflow: "hidden", transition: "all 0.2s"
            }}>
              <button
                onClick={() => setActiveObj(activeObj === i ? null : i)}
                style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  width: "100%", background: "transparent", border: "none",
                  padding: "18px 24px", cursor: "pointer", textAlign: "left", gap: 16
                }}
              >
                <div style={{ fontSize: 14, color: activeObj === i ? "#F5F0E8" : "#C8C4BC", fontWeight: 500, lineHeight: 1.4 }}>
                  "{o.q}"
                </div>
                <div style={{
                  color: "#C8102E", fontSize: 18, flexShrink: 0,
                  transform: activeObj === i ? "rotate(45deg)" : "none",
                  transition: "transform 0.2s"
                }}>
                  +
                </div>
              </button>
              {activeObj === i && (
                <div style={{
                  padding: "0 24px 20px", fontSize: 14, color: "#B0A898",
                  lineHeight: 1.75, borderTop: "1px solid #222"
                }}>
                  <div style={{ paddingTop: 16 }}>{o.a}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      <div style={{
        borderTop: "1px solid #1A1A1A", padding: "12px 40px",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        flexWrap: "wrap", gap: 8
      }}>
        <div style={{ fontSize: 11, color: "#444", fontFamily: "monospace" }}>
          BIRAGAS · AYASS BIOSCIENCE, LLC · TEXAS · MMXXVI
        </div>
        <div style={{ fontSize: 11, color: "#444", fontFamily: "monospace" }}>
          FOR DISCUSSION PURPOSES ONLY
        </div>
      </div>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(BiRAGASFinPlaybook));

const boot = document.getElementById('boot');
if (boot) boot.remove();
</script>
</body>
</html>
